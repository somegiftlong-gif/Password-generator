<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Password Generator</title>
<title>Free Password Generator</title>
<meta name="description" content="Generate strong and secure passwords instantly online.">
<meta name="keywords" content="password generator, secure password, random password">
<style>
* {
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at top, #1f2937, #0f172a);
  color: white;
}

.container {
  width: 340px;
  background: rgba(255, 255, 255, 0.06);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  padding: 24px;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  text-align: center;
}

h1 {
  font-size: 20px;
  margin-bottom: 20px;
  font-weight: 600;
}

label {
  font-size: 14px;
  opacity: 0.9;
}

input[type="number"] {
  width: 100%;
  padding: 10px;
  margin: 10px 0 15px;
  border-radius: 10px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.1);
  color: white;
  text-align: center;
}

.options {
  text-align: left;
  margin-bottom: 15px;
}

.options label {
  display: block;
  margin: 6px 0;
  cursor: pointer;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.2s;
}

.generate {
  background: linear-gradient(90deg, #3b82f6, #06b6d4);
  color: white;
}

.generate:hover {
  transform: scale(1.02);
}

.copy {
  background: rgba(255,255,255,0.1);
  color: white;
}

.copy:hover {
  background: rgba(255,255,255,0.2);
}

.result {
  margin-top: 15px;
  padding: 12px;
  background: rgba(0,0,0,0.3);
  border-radius: 10px;
  word-break: break-all;
  min-height: 40px;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="container">
  <h1>Password Generator</h1>

  <label>Password length</label>
  <input type="number" id="length" value="12" min="4" max="32">

  <div class="options">
    <label><input type="checkbox" id="letters" checked> Letters</label>
    <label><input type="checkbox" id="numbers" checked> Numbers</label>
    <label><input type="checkbox" id="symbols"> Symbols</label>
  </div>

  <button class="generate" onclick="generatePassword()">Generate Password</button>

  <div class="result" id="result"></div>

  <button class="copy" onclick="copyPassword()">Copy</button>
</div>

<script>
function generatePassword() {
  const length = document.getElementById("length").value;
  const useLetters = document.getElementById("letters").checked;
  const useNumbers = document.getElementById("numbers").checked;
  const useSymbols = document.getElementById("symbols").checked;

  const letters = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ";
  const numbers = "0123456789";
  const symbols = "!@#$%^&*()_+[]{}<>?/";

  let chars = "";

  if (useLetters) chars += letters;
  if (useNumbers) chars += numbers;
  if (useSymbols) chars += symbols;

  if (!chars) {
    document.getElementById("result").innerText = "Select options!";
    return;
  }

  let password = "";
  for (let i = 0; i < length; i++) {
    password += chars[Math.floor(Math.random() * chars.length)];
  }

  document.getElementById("result").innerText = password;
}

function copyPassword() {
  const text = document.getElementById("result").innerText;
  if (!text) return;

  navigator.clipboard.writeText(text);
  alert("Copied!");
}
</script>

</body>
</html>
