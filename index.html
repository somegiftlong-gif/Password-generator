<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Password Generator</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: #222;
  padding: 20px;
  border-radius: 10px;
  width: 300px;
  text-align: center;
}

input, button {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
}

.result {
  margin-top: 15px;
  background: black;
  padding: 10px;
  word-break: break-all;
}
</style>
</head>

<body>

<div class="container">
<h2>Password Generator</h2>

<input type="number" id="length" value="12" min="4" max="32">

<label><input type="checkbox" id="letters" checked> Letters</label><br>
<label><input type="checkbox" id="numbers" checked> Numbers</label><br>
<label><input type="checkbox" id="symbols"> Symbols</label>

<button onclick="generate()">Generate</button>

<div class="result" id="result"></div>
</div>

<script>
function generate() {
  const length = document.getElementById("length").value;
  const letters = document.getElementById("letters").checked;
  const numbers = document.getElementById("numbers").checked;
  const symbols = document.getElementById("symbols").checked;

  const l = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ";
  const n = "0123456789";
  const s = "!@#$%^&*()_+[]{}<>?/";

  let chars = "";

  if (letters) chars += l;
  if (numbers) chars += n;
  if (symbols) chars += s;

  let password = "";

  for (let i = 0; i < length; i++) {
    password += chars[Math.floor(Math.random() * chars.length)];
  }

  document.getElementById("result").innerText = password;
}
</script>

</body>
</html>
